<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lien invalide · OU TOU BON</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(160deg,#0a0e1a 0%,#111827 50%,#0f172a 100%);
  color:#e2e8f0; min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:1.5rem;
}
.box { text-align:center; max-width:400px; }
.icon { font-size:3rem; color:#ef4444; margin-bottom:1rem; }
h1 { font-size:1.3rem; font-weight:800; margin-bottom:.5rem; }
p { color:#94a3b8; font-size:.9rem; line-height:1.5; margin-bottom:1.5rem; }
a { color:#fbbf24; text-decoration:none; font-weight:600; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="box">
  <div class="icon"><i class="fas fa-link-slash"></i></div>
  <h1>Ce lien n'est pas valide</h1>
  <p>Le lien que tu as utilisé est invalide ou a expiré. Demande à l'élève de t'envoyer un nouveau lien.</p>
  <a href="/"><i class="fas fa-home"></i> Aller sur OU TOU BON</a>
</div>
</body>
</html>
