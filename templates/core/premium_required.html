{% extends "base.html" %}
{% block title %}Premium requis · OU TOU BON{% endblock %}

{% block body %}
<style>
.premium-wall {
  display:flex; align-items:center; justify-content:center;
  min-height:calc(100vh - 60px); padding:2rem 1.5rem;
}
.premium-wall-card {
  background:linear-gradient(145deg,#1e293b,#0f172a);
  border:1px solid rgba(251,191,36,.2);
  border-radius:24px; padding:3rem 2.5rem;
  max-width:480px; width:100%; text-align:center;
  position:relative; overflow:hidden;
}
.premium-wall-card::before {
  content:''; position:absolute; right:-50px; top:-50px;
  width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle,rgba(251,191,36,.1),transparent 70%);
  pointer-events:none;
}
.pw-icon { font-size:3.5rem; margin-bottom:1.25rem; }
.pw-title { font-size:1.5rem; font-weight:800; margin-bottom:.5rem; }
.pw-feat {
  display:inline-flex; align-items:center; gap:.4rem;
  background:rgba(251,191,36,.1); border:1px solid rgba(251,191,36,.25);
  color:#fbbf24; padding:.3rem .8rem; border-radius:8px;
  font-size:.8rem; font-weight:700; margin-bottom:1rem;
}
.pw-msg { color:#94a3b8; font-size:.9rem; line-height:1.6; margin-bottom:2rem; }
.pw-btn {
  display:inline-flex; align-items:center; gap:.6rem;
  background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#1e293b;
  padding:.9rem 2rem; border-radius:14px; border:none;
  font-weight:800; font-size:1rem; cursor:pointer;
  text-decoration:none; transition:opacity .2s;
}
.pw-btn:hover { opacity:.88; }
.pw-back {
  display:block; margin-top:1.25rem;
  color:#64748b; font-size:.82rem; text-decoration:none;
}
.pw-back:hover { color:#e2e8f0; }
</style>

<div class="app has-topbar">
  {% include "core/_sidebar.html" with active_page="pricing" %}
  <div class="main">
    <div class="topbar"><div class="topbar-title">🔒 Fonctionnalité Premium</div></div>
    <div class="view-area">
      <div class="premium-wall">
        <div class="premium-wall-card">
          <div class="pw-icon">👑</div>
          <h1 class="pw-title">Accès Premium requis</h1>
          <div class="pw-feat"><i class="fas fa-lock"></i> {{ feature }}</div>
          <p class="pw-msg">{{ message }}</p>
          <a href="{% url 'pricing' %}" class="pw-btn">
            <i class="fas fa-crown"></i> Voir les plans
          </a>
          <a href="{% url 'dashboard' %}" class="pw-back">
            <i class="fas fa-arrow-left"></i> Retour à l'accueil
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
