{% extends 'base.html' %}
{% block title %}{{ course_name }} — OU TOU BON{% endblock %}

{% block extra_css %}
<style>

.cours-page {
  --c1: {{ course_color_1|default:"#60a5fa" }};
  --c2: {{ course_color_2|default:"#f59e0b" }};
  --c3: {{ course_color_3|default:"#38bdf8" }};
  --shell: linear-gradient(180deg, rgba(6,16,32,0.96) 0%, rgba(2,8,23,1) 42%, rgba(9,20,35,1) 100%);
  --glass: rgba(15,23,42,0.72);
  --line-soft: rgba(148,163,184,0.14);
  --t1: #f1f5f9; --t2: #cbd5e1; --t3: #94a3b8;
}
.cours-page { overflow-x: hidden; overflow-y: auto; }
.cours-shell { overflow-x: hidden; }
.chapter-full-content { overflow-x: hidden; }
.cours-page .view-area {
  background:
    radial-gradient(circle at top left, color-mix(in srgb, var(--c1) 16%, transparent), transparent 28%),
    radial-gradient(circle at top right, color-mix(in srgb, var(--c2) 16%, transparent), transparent 24%),
    var(--shell);
  overflow-x: hidden;
}
.cours-shell { max-width: 1440px; margin: 0 auto; padding: clamp(0.5rem,2vw,1.25rem) clamp(0.5rem,2vw,1.25rem) 3rem; }

.cours-hero {
  position: relative; overflow: hidden; padding: 2rem;
  border: 1px solid rgba(96,165,250,0.18); border-radius: 28px;
  background: linear-gradient(135deg, rgba(8,15,29,0.96), rgba(17,24,39,0.9)),
              linear-gradient(120deg, color-mix(in srgb, var(--c1) 12%, transparent), color-mix(in srgb, var(--c2) 12%, transparent));
  box-shadow: 0 30px 90px rgba(2,8,23,0.45);
}
.hero-top-row { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; }
.back-to-cours-btn {
  display:inline-flex; align-items:center; gap:0.45rem; padding:0.4rem 0.85rem;
  border-radius:10px; background:rgba(15,23,42,0.6); border:1px solid rgba(148,163,184,0.18);
  color:#94a3b8; font-size:0.78rem; font-weight:700; text-decoration:none; transition:all 0.2s;
}
.back-to-cours-btn:hover { background:rgba(96,165,250,0.12); border-color:rgba(96,165,250,0.3); color:#60a5fa; }
.hero-kicker {
  display:inline-flex; align-items:center; gap:0.55rem; padding:0.45rem 0.8rem;
  border-radius:999px; background:rgba(15,23,42,0.75); border:1px solid color-mix(in srgb, var(--c1) 20%, transparent);
  color:var(--c1); font-size:0.76rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase;
}
.hero-copy h1 { max-width:760px; margin:0 0 0.85rem; font-size:clamp(1.8rem,4vw,3.2rem); line-height:1.05; font-weight:900; letter-spacing:-0.05em; color:var(--t1); }
.hero-copy p { max-width:760px; color:#e2e8f0; opacity:0.86; font-size:1rem; line-height:1.85; }

.chapters-container { display:grid; opacity:1; transition:opacity 0.3s; width:100%; grid-template-columns:1fr; }
.chapters-container.hidden { display:none; }
.cours-hero.hidden { display:none; }
.chapters-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:1rem; margin-top:clamp(1.5rem,4vw,2.5rem); width:100%; align-items:stretch; }
.chapter-card-btn {
  position:relative; overflow:visible; width:100%; border-radius:clamp(12px,1.5vw,18px);
  border:2px solid color-mix(in srgb, var(--c1) 20%, transparent);
  background:linear-gradient(135deg, rgba(20,30,48,0.92), rgba(25,35,55,0.88));
  box-shadow:0 12px 32px rgba(2,8,23,0.28); padding:clamp(1.2rem,4vw,1.6rem) clamp(0.9rem,2.5vw,1rem);
  cursor:pointer; transition:all 0.24s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column;
  gap:0.85rem; text-align:center; font-family:inherit; justify-content:space-between;
}
.chapter-card-btn:hover { transform:translateY(-4px); border-color:color-mix(in srgb, var(--c1) 50%, transparent); box-shadow:0 20px 50px color-mix(in srgb, var(--c1) 25%, transparent); }
.chapter-card-btn::before { content:''; position:absolute; inset:0; pointer-events:none; background:linear-gradient(120deg, color-mix(in srgb, var(--c1) 8%, transparent), transparent 50%, color-mix(in srgb, var(--c2) 6%, transparent)); }
.chapter-card-top { display:flex; flex-direction:column; gap:0.6rem; }
.chapter-number-badge { font-size:clamp(1.1rem,4vw,1.8rem); font-weight:900; color:var(--c1); line-height:1.1; }
.chapter-title { margin:0; font-size:clamp(0.75rem,2.5vw,0.95rem); font-weight:700; color:var(--t1); line-height:1.4; word-break:break-word; overflow-wrap:break-word; }
.chapter-progress-bar-container { position:relative; width:100%; height:clamp(4px,1vw,6px); border-radius:3px; background:rgba(148,163,184,0.15); overflow:hidden; }
.chapter-progress-bar { height:100%; width:0%; border-radius:3px; transition:width 0.3s; box-shadow:0 0 12px color-mix(in srgb, var(--c1) 40%, transparent); }
.progress-percentage { font-size:clamp(0.65rem,1.5vw,0.75rem); color:#fff; font-weight:700; text-align:center; margin-top:0.3rem; }

.cours-content-area { display:none; }
.cours-content-area.active { display:grid; }
.chapter-full {
  position:relative; overflow:visible; border-radius:clamp(20px,3vw,32px);
  border:1px solid rgba(96,165,250,0.15); background:linear-gradient(180deg, rgba(5,12,24,0.96), rgba(8,15,28,0.92));
  box-shadow:0 20px 60px rgba(0,0,0,0.5), inset 0 1px 1px rgba(96,165,250,0.1);
  padding:clamp(1.5rem,4vw,2.5rem); max-width:900px; margin:0 auto;
}
.chapter-full-header {
  position:sticky; top:0; z-index:10; margin-bottom:clamp(1.4rem,3vw,2.2rem); padding:clamp(.6rem,1.5vw,1rem) 0 clamp(1rem,2vw,1.8rem);
  border-bottom:2px solid rgba(96,165,250,0.2); display:flex; align-items:center; gap:clamp(1rem,2vw,1.5rem);
  background:#020c18;
}
.chapter-back-btn {
  background:rgba(96,165,250,0.12); border:1px solid rgba(96,165,250,0.2); color:#60a5fa;
  padding:0.7rem; border-radius:12px; cursor:pointer; transition:all 0.2s; font-size:1rem;
  display:flex; align-items:center; justify-content:center; width:40px; height:40px; flex-shrink:0;
}
.chapter-back-btn:hover { background:rgba(96,165,250,0.22); border-color:rgba(96,165,250,0.4); }
.chapter-full h2 {
  margin:0; font-size:clamp(1.8rem,5vw,2.4rem); line-height:1.1;
  color:var(--c1);
  flex:1; word-break:break-word; font-weight:800; letter-spacing:-0.02em;
}

.chapter-text { color:#cdd9e8; line-height:1.95; font-size:clamp(0.97rem,2.1vw,1.07rem); margin-bottom:clamp(1.8rem,3.5vw,2.4rem); font-weight:400; letter-spacing:0.22px; overflow-wrap:break-word; word-break:break-word; max-width:100%; }
.chapter-text strong, .chapter-text b { color:#f0f6ff; font-weight:700; }
.chapter-text em, .chapter-text i { color:#b8d0ea; font-style:italic; }
.chapter-text code { background:rgba(96,165,250,0.15); color:#60a5fa; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.92em; font-weight:600; }
.chapter-text h2 {
  position:relative; margin:2.8rem 0 1.5rem; padding:1rem 1.5rem 1rem 1.2rem;
  font-size:clamp(1.15rem,2.5vw,1.4rem); font-weight:800; letter-spacing:-0.02em; line-height:1.3;
  color:#e0e7ff; background:linear-gradient(90deg, rgba(96,165,250,0.08), transparent 60%);
  border-left:4px solid #60a5fa; border-radius:0 12px 12px 0;
  box-shadow:0 2px 16px rgba(96,165,250,0.08);
}
.chapter-text h3 {
  position:relative; margin:3rem 0 1.4rem; padding:1.1rem 1.5rem 1.1rem 4.8rem;
  font-size:clamp(1.05rem,2.3vw,1.3rem); font-weight:800; letter-spacing:-0.015em; line-height:1.4;
  color:#fcd34d; background:linear-gradient(135deg, rgba(245,158,11,0.13), rgba(249,115,22,0.07));
  border:1px solid rgba(245,158,11,0.22); border-left:4px solid #f59e0b; border-radius:0 16px 16px 0;
  box-shadow:0 4px 32px rgba(245,158,11,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
}
.chapter-text h3::before { content:'\f02d'; font-family:'Font Awesome 6 Free'; font-weight:900; color:rgba(255,255,255,0.9); font-size:0.9rem; display:flex; align-items:center; justify-content:center; position:absolute; left:1.1rem; top:50%; transform:translateY(-50%); width:2.4rem; height:2.4rem; background:linear-gradient(135deg, #f59e0b, #ea580c); border-radius:9px; box-shadow:0 0 20px rgba(245,158,11,0.55); }
.chapter-text h4 { position:relative; margin:2.2rem 0 1rem; padding:0.75rem 1.2rem 0.75rem 1.6rem; font-size:clamp(0.98rem,2vw,1.12rem); font-weight:700; color:#7de8ff; border-left:3px solid #38bdf8; background:linear-gradient(90deg, rgba(56,189,248,0.1), transparent 65%); border-radius:0 10px 10px 0; }
.chapter-text p { margin:clamp(1rem,2vw,1.4rem) 0; letter-spacing:0.22px; color:#cdd9e8; overflow-wrap:break-word; word-break:break-word; }
.chapter-text ul, .chapter-text ol { margin:clamp(1.2rem,2.5vw,1.8rem) 0 clamp(1.2rem,2.5vw,1.8rem) clamp(1.6rem,3vw,2.4rem); padding:0; }
.chapter-text li { margin:clamp(0.55rem,1.1vw,0.82rem) 0; color:#cdd9e8; line-height:1.9; }
.chapter-text ul > li::marker { color:#60a5fa; font-weight:700; }
.chapter-text ol > li::marker { color:#f59e0b; font-weight:700; }

.chapter-text .table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  display: block;
  width: 100%;
  margin: 1.8rem 0;
  border-radius: 14px;
  border: 1px solid rgba(96,165,250,0.22);
  box-shadow: 0 4px 24px rgba(96,165,250,0.08);
  scrollbar-width: thin;
  scrollbar-color: rgba(96,165,250,0.3) transparent;
}
.chapter-text .table-wrap::-webkit-scrollbar { height: 5px; }
.chapter-text .table-wrap::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.4); border-radius: 4px; }
.chapter-text table {
  table-layout: fixed;   
  width: 100%;
  border-collapse: collapse;
  font-size: .88rem;
}
.chapter-text thead { position: sticky; top: 0; z-index: 1; }
.chapter-text th {
  padding: .65rem 1rem;
  background: linear-gradient(135deg, rgba(96,165,250,0.22), rgba(56,189,248,0.14));
  color: #93c5fd;
  font-weight: 800;
  text-align: left;
  font-size: .8rem;
  letter-spacing: .04em;
  text-transform: uppercase;
  border-bottom: 2px solid rgba(96,165,250,0.35);
  border-right: 1px solid rgba(96,165,250,0.12);
  white-space: normal;   
  word-break: break-word;
  overflow-wrap: break-word;
}
.chapter-text td {
  padding: .55rem 1rem;
  border-bottom: 1px solid rgba(148,163,184,0.1);
  border-right: 1px solid rgba(148,163,184,0.07);
  color: #cdd9e8;
  vertical-align: top;
  word-break: break-word;
  overflow-wrap: break-word;
}
.chapter-text th:last-child, .chapter-text td:last-child { border-right: none; }
.chapter-text tbody tr:nth-child(odd) td { background: rgba(96,165,250,0.03); }
.chapter-text tbody tr:hover td { background: rgba(96,165,250,0.08); color: #e2e8f0; transition: background .15s; }

.formula-block, .formula-card {
  position:relative; margin:2.2rem 0; padding:1.8rem 2rem 1.6rem;
  background:radial-gradient(ellipse at top, rgba(37,99,235,0.18) 0%, transparent 60%), linear-gradient(135deg, rgba(15,30,80,0.45), rgba(8,20,50,0.4));
  border:1px solid rgba(96,165,250,0.32); border-top:2px solid rgba(96,165,250,0.6);
  border-radius:18px; box-shadow:0 0 0 1px rgba(96,165,250,0.06), 0 12px 55px rgba(96,165,250,0.15);
  overflow-x:auto; text-align:center;
}
.formula-block::before, .formula-card::before {
  content:'FORMULE'; position:absolute; top:-1px; right:1.5rem;
  background:linear-gradient(135deg, #1e40af, #0369a1); color:#fff; font-size:0.58rem;
  font-weight:900; letter-spacing:0.14em; padding:0.24rem 0.9rem; border-radius:0 0 11px 11px;
  box-shadow:0 4px 16px rgba(30,64,175,0.5);
}
.katex-display { margin:0 !important; padding:0.5rem 0 !important; overflow-x:auto; }
.formula-card .katex-display > .katex, .formula-block .katex-display > .katex { font-size:1.35em; }
.chapter-text .katex:not(.katex-display .katex) { display:inline-block; background:rgba(37,99,235,0.12); padding:0.05rem 0.4rem; border-radius:5px; color:#93c5fd; font-size:1.05em; }

.key-point { position:relative; margin:1.4rem 0; padding:1.15rem 1.5rem 1.15rem 4.2rem; background:linear-gradient(135deg, rgba(245,158,11,0.11), rgba(249,115,22,0.06)); border-left:4px solid #f59e0b; border-radius:0 14px 14px 0; color:#f5e8c8; font-weight:500; line-height:1.85; }
.key-point::before { content:'💡'; position:absolute; left:1rem; top:50%; transform:translateY(-50%); font-size:1.35rem; }
.highlight-box { position:relative; margin:1.5rem 0; padding:1.1rem 1.5rem 1.1rem 4.2rem; border-radius:0 14px 14px 0; border-left:4px solid; line-height:1.85; font-weight:500; }
.highlight-box::before { position:absolute; left:1rem; top:50%; transform:translateY(-50%); font-size:1.3rem; }
.highlight-astuce, .highlight-tip { background:linear-gradient(135deg, rgba(34,197,94,0.11), rgba(16,185,129,0.06)); border-left-color:#22c55e; color:#d1fae5; }
.highlight-astuce::before, .highlight-tip::before { content:'✅'; }
.highlight-attention, .highlight-warning { background:linear-gradient(135deg, rgba(239,68,68,0.11), rgba(220,38,38,0.06)); border-left-color:#ef4444; color:#fee2e2; }
.highlight-attention::before, .highlight-warning::before { content:'⚠️'; }
.highlight-note, .highlight-info { background:linear-gradient(135deg, rgba(96,165,250,0.11), rgba(56,189,248,0.06)); border-left-color:#60a5fa; color:#dbeafe; }
.highlight-note::before, .highlight-info::before { content:'📌'; }
.highlight-important { background:linear-gradient(135deg, rgba(245,158,11,0.13), rgba(217,119,6,0.07)); border-left-color:#f59e0b; color:#fef3c7; }
.highlight-important::before { content:'⭐'; }
.highlight-definition { background:linear-gradient(135deg, rgba(168,85,247,0.13), rgba(139,92,246,0.07)); border-left-color:#a855f7; color:#f3e8ff; }
.highlight-definition::before { content:'📖'; }
.callout-raisonnement { background:linear-gradient(135deg, rgba(99,102,241,0.13), rgba(79,70,229,0.07)); border-left-color:#818cf8; color:#e0e7ff; }
.callout-raisonnement::before { content:'🧠'; }
.callout-cas { background:linear-gradient(135deg, rgba(245,158,11,0.11), rgba(234,88,12,0.06)); border-left-color:#f59e0b; color:#fef3c7; }
.callout-cas::before { content:'🔍'; }
.definition-item { position:relative; margin:0.8rem 0; padding:0.95rem 1.2rem 0.95rem 3.8rem; background:linear-gradient(135deg, rgba(96,165,250,0.1), rgba(56,189,248,0.05)); border-left:3px solid #60a5fa; border-radius:0 12px 12px 0; color:#dde8f5; line-height:1.75; font-size:clamp(0.9rem,2vw,1rem); }
.definition-item::before { content:'Déf'; position:absolute; left:0.6rem; top:50%; transform:translateY(-50%); font-size:0.58rem; font-weight:900; color:#60a5fa; background:rgba(96,165,250,0.18); padding:0.15rem 0.35rem; border-radius:4px; }
.numbered-block { position:relative; margin:0.9rem 0; padding:1rem 1.3rem 1rem 1.5rem; background:linear-gradient(135deg, rgba(245,158,11,0.09), rgba(249,115,22,0.04)); border-left:3px solid #f59e0b; border-radius:0 13px 13px 0; display:flex; gap:1rem; align-items:flex-start; line-height:1.85; }
.numbered-block .enum-symbol { color:#f59e0b; font-weight:800; font-size:1.35em; flex-shrink:0; min-width:2.1rem; height:2.1rem; display:flex; align-items:center; justify-content:center; background:rgba(245,158,11,0.14); border-radius:8px; }
.numbered-block .enum-content { color:#dde6f3; flex:1; font-weight:500; }

.quiz-wrap { width:100%; background:linear-gradient(180deg, rgba(15,23,42,0.4), rgba(15,23,42,0.2)); border:1px solid rgba(96,165,250,0.12); border-radius:clamp(18px,3vw,24px); padding:clamp(1.8rem,3.5vw,2.5rem); margin:clamp(2rem,4vw,3rem) 0; }
.quiz-grid { display:grid; gap:clamp(1.4rem,2.5vw,1.8rem); margin:clamp(1.4rem,2.5vw,2rem) 0; }
.quiz-card { background:linear-gradient(135deg, rgba(59,130,246,0.08), rgba(99,102,241,0.06)); border:1px solid rgba(59,130,246,0.15); border-radius:clamp(14px,2vw,20px); padding:clamp(1.2rem,2vw,1.6rem); opacity:0; animation:slideIn 0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.quiz-card:nth-child(1){animation-delay:.1s}.quiz-card:nth-child(2){animation-delay:.2s}.quiz-card:nth-child(3){animation-delay:.3s}
.quiz-card h4 { margin:0 0 clamp(1rem,2vw,1.4rem); font-size:clamp(1rem,2vw,1.15rem); font-weight:700; color:#e2e8f0; line-height:1.6; }
.quiz-options { display:flex; flex-direction:column; gap:clamp(0.8rem,1.5vw,1rem); margin-bottom:clamp(1.2rem,2vw,1.6rem); }
.quiz-option { display:flex; gap:clamp(0.6rem,1.5vw,0.85rem); align-items:flex-start; width:100%; padding:clamp(0.75rem,1.5vw,0.95rem) clamp(0.9rem,2vw,1.1rem); border-radius:14px; background:rgba(15,23,42,0.6); border:1px solid rgba(148,163,184,0.12); color:var(--t2); text-align:left; cursor:pointer; transition:border-color 0.18s, background 0.18s, transform 0.18s; font-size:clamp(0.9rem,1.8vw,0.95rem); font-weight:500; }
.quiz-option:hover { transform:translateY(-2px); border-color:rgba(59,130,246,0.25); background:rgba(59,130,246,0.08); }
.quiz-option.selected { border-color:rgba(59,130,246,0.35); background:linear-gradient(135deg, rgba(59,130,246,0.15), rgba(99,102,241,0.12)); color:var(--t1); }
.quiz-option.correct-answer { border-color:rgba(34,197,94,0.35); background:linear-gradient(135deg, rgba(34,197,94,0.12), rgba(22,163,74,0.08)); color:#86efac; }
.quiz-option.wrong-answer { border-color:rgba(239,68,68,0.3); background:linear-gradient(135deg, rgba(239,68,68,0.12), rgba(220,38,38,0.08)); color:#fecaca; }
.option-letter { width:clamp(28px,3vw,32px); height:clamp(28px,3vw,32px); border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:clamp(0.7rem,1.5vw,0.8rem); font-weight:800; background:rgba(148,163,184,0.12); color:rgba(148,163,184,0.7); }
.quiz-option.correct-answer .option-letter { background:linear-gradient(135deg, #22c55e, #16a34a); color:#000; }
.quiz-option.wrong-answer .option-letter { background:linear-gradient(135deg, #ef4444, #dc2626); color:#fff; }
.quiz-option.selected .option-letter { background:linear-gradient(135deg, #3b82f6, #2563eb); color:#fff; }
.quiz-explanation { padding:clamp(0.9rem,2vw,1.2rem); background:rgba(99,102,241,0.08); border-left:3px solid #6366f1; border-radius:10px; color:#cbd5e1; line-height:1.6; font-size:clamp(0.9rem,1.8vw,0.95rem); display:none; }
.quiz-explanation.show { display:block; animation:fadeIn 0.3s ease-in; }
.quiz-actions { display:flex; gap:1rem; flex-wrap:wrap; margin:clamp(1.5rem,3vw,2rem) 0; }
.quiz-submit { padding:clamp(0.75rem,1.5vw,0.95rem) clamp(1.2rem,2vw,1.6rem); border-radius:12px; border:none; background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; font-weight:700; cursor:pointer; font-size:clamp(0.85rem,1.8vw,0.95rem); transition:all 0.3s; box-shadow:0 4px 12px rgba(59,130,246,0.3); }
.quiz-submit:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 20px rgba(59,130,246,0.4); }
.quiz-submit:disabled { opacity:0.6; cursor:not-allowed; }
.quiz-reset { padding:clamp(0.75rem,1.5vw,0.95rem) clamp(1.2rem,2vw,1.6rem); border-radius:12px; border:1px solid rgba(148,163,184,0.2); background:rgba(148,163,184,0.08); color:#cbd5e1; font-weight:700; cursor:pointer; font-size:clamp(0.85rem,1.8vw,0.95rem); transition:all 0.3s; }

.ex-wrap { width:100%; background:linear-gradient(180deg,rgba(251,191,36,0.05),rgba(245,158,11,0.02)); border:1px solid rgba(251,191,36,0.18); border-radius:clamp(18px,3vw,24px); padding:clamp(1.8rem,3.5vw,2.5rem); margin:clamp(2rem,4vw,3rem) 0; }
